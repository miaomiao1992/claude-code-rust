name: Release

on:
  push:
    tags:
      - 'v*' # Trigger on version tags like v1.0.0, v2.1.3, etc.
  workflow_dispatch: # Allow manual triggering
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.0)'
        required: true

jobs:
  test:
    name: Test and Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64-unknown-linux-gnu, x86_64-apple-darwin, x86_64-pc-windows-msvc]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history for git describe

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}
          profile: minimal
          override: true

      - name: Cache cargo dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TERM_COLOR: always

      - name: Run tests
        run: cargo test --target ${{ matrix.target }}
        env:
          CARGO_TERM_COLOR: always

      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        with:
          name: claude-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/claude*

  publish-npm:
    name: Publish to npm
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org/'

      - name: Install dependencies
        run: npm ci

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Update version in package.json
        run: |
          npm version ${{ steps.get_version.outputs.VERSION }} --no-git-tag-version
          echo "Updated to version ${{ steps.get_version.outputs.VERSION }}"

      - name: Update version in Cargo.toml
        run: |
          sed -i "s/version = \".*\"/version = \"${{ steps.get_version.outputs.VERSION }}\"/" Cargo.toml
          sed -i "s/\[workspace.package\][^]]*version = \".*\"/[workspace.package]\nversion = \"${{ steps.get_version.outputs.VERSION }}\"/" Cargo.toml

      - name: Build package
        run: npm run build

      - name: Verify package
        run: |
          ./bin/claude --version
          npm pack --dry-run

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          name: Release v${{ steps.get_version.outputs.VERSION }}
          body: |
            # Claude Code Rust v${{ steps.get_version.outputs.VERSION }}

            ## What's Changed
            <!-- Automatically generated changelog will go here -->

            ## Installation

            ```bash
            npm install claude-code-rust
            ```

            ## Usage

            ```bash
            npx claude-code
            # or
            npx claude
            ```

            ## SHA256 Checksums
            <!-- Checksums will be automatically added -->

          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            package.json
            Cargo.toml
            README.md
            bin/*

  publish-github:
    name: Create GitHub Release
    needs: [test, publish-npm]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v3
        with:
          path: artifacts

      - name: Generate checksums
        run: |
          find artifacts -type f -name "claude*" -exec sha256sum {} \; > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          name: Release ${{ github.ref_name }}
          body_path: CHANGELOG.md
          draft: false
          prerelease: false
          files: |
            checksums.txt
            artifacts/**/*

  version-check:
    name: Version Consistency Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check version consistency
        run: |
          # Extract version from Cargo.toml
          CARGO_VERSION=$(grep -m1 'version =' Cargo.toml | cut -d'"' -f2)

          # Extract version from package.json
          NPM_VERSION=$(node -p "require('./package.json').version")

          # Extract version from git tag (if exists)
          GIT_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          echo "Cargo.toml version: $CARGO_VERSION"
          echo "package.json version: $NPM_VERSION"
          echo "Git tag: $GIT_TAG"

          # Check consistency
          if [ "$CARGO_VERSION" != "$NPM_VERSION" ]; then
            echo "❌ Version mismatch between Cargo.toml and package.json"
            exit 1
          fi

          if [ -n "$GIT_TAG" ] && [ "v$CARGO_VERSION" != "$GIT_TAG" ]; then
            echo "⚠️ Git tag doesn't match version (expected v$CARGO_VERSION, got $GIT_TAG)"
          fi

          echo "✅ Versions are consistent"
